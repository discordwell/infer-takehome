services:
  infer:
    build: .
    init: true
    ports:
      - "127.0.0.1:8310:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PLAYWRIGHT_HEADLESS: "${PLAYWRIGHT_HEADLESS:-true}"
      PLAYWRIGHT_SLOWMO_MS: "0"
      SESSION_TTL_SECONDS: "${SESSION_TTL_SECONDS:-86400}"
      AUTH_STATE_MAX_AGE_SECONDS: "${AUTH_STATE_MAX_AGE_SECONDS:-2592000}"
      USAA_QUICK_PATH_MAX_AGE_SECONDS: "${USAA_QUICK_PATH_MAX_AGE_SECONDS:-1800}"
      PERSIST_COMPLETED_RESULTS: "${PERSIST_COMPLETED_RESULTS:-true}"
      LOG_FILE_PATH: "${LOG_FILE_PATH:-/app/storage/logs/app.log}"
      LOG_MAX_BYTES: "${LOG_MAX_BYTES:-10485760}"
      LOG_BACKUP_COUNT: "${LOG_BACKUP_COUNT:-5}"
      CARRIER_MOCK: "${CARRIER_MOCK:-false}"
      USAA_MFA_EMAIL: "${USAA_MFA_EMAIL:-}"
      WORKER_BASE_URL: "${WORKER_BASE_URL:-}"
      WORKER_PROXY_CARRIERS: "${WORKER_PROXY_CARRIERS:-usaa}"
      USAA_WORKER_BASE_URL: "${USAA_WORKER_BASE_URL:-}"
      DEV_PREFILL_CREDS: "false"
      CHROME_BINARY: "/usr/bin/google-chrome-stable"
    volumes:
      - infer-storage:/app/storage
    shm_size: "2gb"
    restart: unless-stopped

volumes:
  infer-storage:
